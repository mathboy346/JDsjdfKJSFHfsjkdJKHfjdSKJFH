# Manual: workflow_dispatch (triggered by an external scheduler)
name: Pipeline B

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: pipeline-b
  cancel-in-progress: false

jobs:
  shards:
    name: Shard ${{ matrix.shard }} / T+${{ matrix.day_offset }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
        day_offset: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper

      - name: Run shard
        env:
          SHARD_ID: ${{ matrix.shard }}
          ADVANCE_DAY_OFFSET: ${{ matrix.day_offset }}
        run: |
          OUT=$(python -m backend.scrapers.sharded.advance_shard)
          cp "$OUT" "detailed-${{ matrix.shard }}-${{ matrix.day_offset }}.json"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: detailed-${{ matrix.shard }}-${{ matrix.day_offset }}
          path: detailed-${{ matrix.shard }}-${{ matrix.day_offset }}.json
          retention-days: 1

  combine:
    name: Combine shards
    needs: shards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: shard_data
          pattern: detailed-*
          merge-multiple: true

      - name: Combine shards
        run: |
          mkdir -p combined
          cp shard_data/*.json combined/
          python -m backend.scrapers.sharded.combine \
            --mode advance \
            --input-dir combined \
            --output combined/final_rows.json

      - name: Upload combined rows
        uses: actions/upload-artifact@v4
        with:
          name: combined-advance
          path: combined/final_rows.json
          retention-days: 1

  ingest-granular:
    name: Ingest granular
    needs: combine
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download combined rows
        uses: actions/download-artifact@v4
        with:
          name: combined-advance
          path: combined

      - name: Ingest granular records
        env:
          DATABASE_URL: ${{ secrets.PIPE_DSN }}
          SHOW_LOG_USE_COPY: "1"
        run: |
          python -m backend.jobs.ingest_combined \
            --mode advance \
            --rows-file combined/final_rows.json \
            --granular-only

  ingest-aggregates:
    name: Ingest aggregates
    needs: combine
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download combined rows
        uses: actions/download-artifact@v4
        with:
          name: combined-advance
          path: combined

      - name: Ingest aggregate records
        env:
          DATABASE_URL: ${{ secrets.PIPE_DSN }}
        run: |
          python -m backend.jobs.ingest_combined \
            --mode advance \
            --rows-file combined/final_rows.json \
            --aggregates-only
